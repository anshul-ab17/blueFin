# Bluefin API — nginx reverse proxy (Hetzner VPS)
# Install: copy to /etc/nginx/sites-available/bluefin-api, replace YOUR_DOMAIN,
#          ln -sf /etc/nginx/sites-available/bluefin-api /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# TLS:     certbot --nginx -d YOUR_DOMAIN   (certbot rewrites this file for 443)
# Keep in sync with the inline block in apps/api/deploy/setup.sh.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # axum binds here (see /opt/bluefin-api/.env BIND_ADDR)
    location / {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE (live odds stream): no buffering, long-lived connections
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # basic hardening
    server_tokens off;
    client_max_body_size 64k;
}
